<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中新手村大冒險：轉銜大挑戰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 遊戲背景圖 */
    .bg-game-pattern {
      background-color: #1e293b;
      background-image: url("data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDEwIEwgNDAgMTAgTSAxMCAwIEwgMTAgNDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIgc3Ryb2tlLXdpZHRoPSIyIi8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMWUyOTNiIi8+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0idXJsKCNncmlkKSIvPjwvc3ZnPg==");
    }
    
    /* 自訂動畫 */
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes bob-delay {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes float-up {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
    }
    @keyframes zoom-in-90 {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-5deg); }
      75% { transform: translateX(5px) rotate(5deg); }
    }
    @keyframes pulse-slow {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    @keyframes spin-bg {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .animate-bob { animation: bob 2s ease-in-out infinite; }
    .animate-bob-delay { animation: bob-delay 2s ease-in-out infinite 1s; }
    .animate-float-up { animation: float-up 1s ease-out forwards; }
    .animate-zoom-in { animation: zoom-in-90 0.3s ease-out forwards; }
    .animate-shake { animation: shake 0.5s infinite; }
    .animate-pulse-slow { animation: pulse-slow 2s infinite; }
    .animate-spin-bg { animation: spin-bg 8s linear infinite; }
    
    .radial-burst {
      background: conic-gradient(from 0deg, transparent 0 15deg, #fff 15deg 30deg, transparent 30deg 45deg, #fff 45deg 60deg, transparent 60deg 75deg, #fff 75deg 90deg, transparent 90deg 105deg, #fff 105deg 120deg, transparent 120deg 135deg, #fff 135deg 150deg, transparent 150deg 165deg, #fff 165deg 180deg, transparent 180deg 195deg, #fff 195deg 210deg, transparent 210deg 225deg, #fff 225deg 240deg, transparent 240deg 255deg, #fff 255deg 270deg, transparent 270deg 285deg, #fff 285deg 300deg, transparent 300deg 315deg, #fff 315deg 330deg, transparent 330deg 345deg, #fff 345deg 360deg);
    }
  </style>
</head>
<body class="bg-game-pattern font-sans text-slate-900 m-0 p-0 selection:bg-yellow-300">

  <!-- 遊戲首頁 -->
  <div id="start-screen" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-md w-full bg-indigo-500 rounded-3xl p-8 border-4 border-slate-900 border-b-[12px] text-center transform transition-transform hover:scale-105">
      <div class="w-32 h-32 bg-yellow-400 rounded-2xl mx-auto mb-6 flex items-center justify-center border-4 border-slate-900 border-b-8 rotate-3 animate-bounce">
        <span class="text-6xl text-slate-900">🏆</span>
      </div>
      <h1 class="text-4xl sm:text-5xl font-black text-white mb-2 tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">轉銜探索</h1>
      <h2 class="text-3xl font-black text-yellow-300 mb-8 drop-shadow-md outline-4">超級大挑戰 🏆</h2>
      <p class="text-white font-bold mb-6 bg-indigo-600 p-2 rounded-xl border-2 border-indigo-700">收集裝備，打倒煩惱大魔王！</p>
      <button onclick="startGame()" class="w-full bg-green-400 hover:bg-green-300 text-slate-900 font-black text-3xl py-4 px-6 rounded-2xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-2 transition-all flex items-center justify-center gap-3">
        <span>▶️</span> 開始冒險
      </button>
    </div>
  </div>

  <!-- 遊戲進行畫面 -->
  <div id="playing-screen" class="min-h-screen p-4 sm:p-8 flex flex-col items-center pb-24 hidden">
    <!-- 頂部玩家狀態區 -->
    <div class="max-w-2xl w-full flex flex-col sm:flex-row justify-between items-center gap-4 mb-4 bg-slate-800 p-4 rounded-2xl border-4 border-slate-900 relative">
      <!-- 動態稱號徽章 -->
      <div id="rank-badge" class="absolute -top-4 -left-2 bg-slate-700 border-2 border-slate-900 px-3 py-1 rounded-full flex items-center gap-1 shadow-lg transform -rotate-3 z-10 animate-pulse">
        <span id="rank-icon" class="text-slate-400 text-sm">🗺️</span>
        <span id="rank-title" class="font-black text-sm text-slate-400">新手村民</span>
      </div>

      <div class="flex items-center gap-2 bg-slate-900 p-2 px-4 rounded-xl border-2 border-slate-700 mt-2 sm:mt-0">
        <span class="text-red-500 animate-[pulse_1s_infinite] text-2xl">❤️</span>
        <span class="text-red-500 animate-[pulse_1s_infinite_100ms] text-2xl">❤️</span>
        <span class="text-red-500 animate-[pulse_1s_infinite_200ms] text-2xl">❤️</span>
      </div>

      <div class="flex-1 w-full flex items-center gap-3 bg-slate-900 p-2 px-4 rounded-xl border-2 border-slate-700 relative">
        <span class="text-yellow-500 text-2xl animate-[spin_3s_linear_infinite]">⭐</span>
        <div class="flex-1 h-6 bg-slate-700 rounded-full border-2 border-slate-900 overflow-hidden relative">
          <div id="xp-bar" class="h-full bg-gradient-to-r from-green-400 to-emerald-300 transition-all duration-700 ease-out" style="width: 0%"></div>
        </div>
        <span id="xp-text" class="text-yellow-400 font-black text-lg min-w-[70px] text-right">0 XP</span>
      </div>
    </div>

    <!-- 動態戰鬥競技場 -->
    <div class="max-w-2xl w-full">
      <div class="w-full h-48 sm:h-56 bg-sky-900 rounded-3xl border-4 border-slate-900 border-b-8 mb-6 relative overflow-hidden flex items-end justify-between px-4 sm:px-16 pb-4">
        <div class="absolute top-4 left-10 w-16 h-8 bg-white/20 rounded-sm"></div>
        <div class="absolute top-10 right-20 w-24 h-6 bg-white/20 rounded-sm"></div>
        <div class="absolute bottom-0 left-0 w-full h-8 bg-green-500 border-t-4 border-slate-900"></div>

        <!-- 左側：方塊勇者 -->
        <div id="hero-avatar" class="relative z-10 transition-all duration-300 transform animate-bob">
          <svg viewBox="0 0 100 100" width="80" height="80" class="overflow-visible drop-shadow-[0_4px_0_rgba(0,0,0,0.3)]">
            <rect id="hero-sword" x="65" y="45" width="40" height="12" fill="#cbd5e1" rx="2" stroke="#1e293b" stroke-width="3" class="transition-transform duration-300 origin-left" />
            <rect x="30" y="40" width="40" height="35" fill="#3b82f6" rx="4" stroke="#1e293b" stroke-width="3" />
            <rect x="35" y="10" width="30" height="30" fill="#fcd34d" rx="4" stroke="#1e293b" stroke-width="3" />
            <rect x="42" y="20" width="6" height="6" fill="#1e293b" />
            <rect x="52" y="20" width="6" height="6" fill="#1e293b" />
            <rect x="32" y="75" width="14" height="16" fill="#1e293b" rx="2" />
            <rect x="54" y="75" width="14" height="16" fill="#1e293b" rx="2" />
          </svg>
        </div>

        <!-- 右側：方塊恐龍怪獸 -->
        <div id="monster-avatar" class="relative z-10 transition-all duration-300 transform animate-bob-delay">
          <div id="monster-damage-text" class="absolute -top-12 left-1/2 -translate-x-1/2 text-2xl font-black text-red-500 drop-shadow-[0_2px_2px_#fff] animate-float-up whitespace-nowrap z-20 hidden">
            -100 HP
          </div>
          <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-24 h-4 bg-slate-900 rounded-full border-2 border-white overflow-hidden shadow-lg">
             <div id="monster-hp-bar" class="h-full bg-red-500 transition-all duration-500" style="width: 100%"></div>
          </div>
          <svg viewBox="0 0 100 100" width="100" height="100" class="overflow-visible drop-shadow-[0_4px_0_rgba(0,0,0,0.3)]">
            <path d="M 70 50 L 90 60 L 70 70 Z" fill="#991b1b" stroke="#1e293b" stroke-width="3" />
            <rect x="25" y="30" width="55" height="50" fill="#ef4444" rx="4" stroke="#1e293b" stroke-width="3" />
            <rect x="5" y="10" width="45" height="35" fill="#dc2626" rx="4" stroke="#1e293b" stroke-width="3" />
            <rect x="15" y="18" width="8" height="8" fill="#fef08a" />
            <rect x="17" y="20" width="4" height="4" fill="#000" />
            <path d="M 5 45 L 10 38 L 15 45 L 20 38 L 25 45 Z" fill="#fff" stroke="#1e293b" stroke-width="2" />
            <rect x="35" y="80" width="14" height="14" fill="#1e293b" rx="2" />
            <rect x="55" y="80" width="14" height="14" fill="#1e293b" rx="2" />
          </svg>
        </div>
      </div>
    </div>

    <!-- 主要任務卡片 -->
    <div class="max-w-2xl w-full relative">
      <div class="bg-white rounded-3xl border-4 border-slate-900 border-b-[12px] p-6 sm:p-8 min-h-[300px]">
        <div class="flex items-center justify-between mb-6">
          <h2 id="level-title" class="text-2xl sm:text-3xl font-black text-slate-900">載入中...</h2>
          <div id="level-counter" class="bg-slate-900 text-white font-black px-4 py-1 rounded-xl border-b-4 border-slate-700 transform rotate-2">任務 1/12</div>
        </div>

        <div id="level-main-icon" class="w-32 h-32 mx-auto mb-6 rounded-3xl border-4 border-slate-900 border-b-8 flex items-center justify-center transform hover:-rotate-3 hover:scale-110 duration-300 animate-[bounce_3s_infinite] text-6xl">
        </div>

        <div class="bg-blue-50 border-4 border-slate-900 border-b-8 rounded-2xl p-4 sm:p-5 mb-6 relative">
          <div class="flex items-start gap-3">
            <button id="btn-story-voice" class="shrink-0 p-3 sm:p-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 transition-all flex items-center justify-center bg-blue-300 hover:bg-blue-200">
              <span class="text-2xl drop-shadow-sm">🔊</span>
            </button>
            <p id="level-story" class="text-slate-800 text-lg sm:text-xl font-bold leading-relaxed pt-1"></p>
          </div>
        </div>

        <div class="bg-amber-100 border-4 border-slate-900 border-b-8 rounded-2xl p-4 sm:p-5 mb-6 relative">
          <div class="flex items-start gap-3">
            <button id="btn-question-voice" class="shrink-0 p-3 sm:p-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 transition-all flex items-center justify-center bg-amber-400 hover:bg-amber-300">
              <span class="text-2xl drop-shadow-sm">🔊</span>
            </button>
            <div class="pt-1">
              <span class="inline-block bg-slate-900 text-amber-400 font-black px-2 py-0.5 rounded-lg text-sm mb-2 transform -rotate-2">挑戰任務</span>
              <p id="level-question" class="text-slate-900 text-xl sm:text-2xl font-black leading-relaxed"></p>
            </div>
          </div>
        </div>

        <div id="options-container" class="space-y-4 mt-8"></div>
      </div>

      <!-- 背包系統 UI -->
      <div class="mt-8 bg-slate-800 p-5 rounded-3xl border-4 border-slate-900 border-b-8 w-full">
        <div class="flex items-center justify-between mb-4">
           <div class="flex items-center gap-2">
             <span class="text-3xl">🎒</span>
             <h3 class="text-white font-black text-xl">我的背包</h3>
           </div>
           <span id="backpack-count" class="text-slate-400 font-bold">0 / 12 裝備</span>
        </div>
        <div id="backpack-grid" class="grid grid-cols-6 sm:grid-cols-12 gap-2"></div>
      </div>

      <!-- 遊戲回饋彈出視窗 (Modal) -->
      <div id="feedback-modal" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm rounded-3xl items-center justify-center p-4 z-20 overflow-hidden hidden flex">
        <div id="feedback-bg-fx" class="absolute inset-0 overflow-hidden rounded-3xl pointer-events-none opacity-40 hidden">
           <div class="w-[200%] h-[200%] absolute top-[-50%] left-[-50%] radial-burst animate-spin-bg"></div>
        </div>
        <div id="feedback-card" class="w-full max-w-sm border-4 border-slate-900 border-b-[12px] rounded-3xl p-6 text-center transform animate-zoom-in relative z-10 bg-white"></div>
      </div>
    </div>
  </div>

  <!-- 遊戲結束畫面 -->
  <div id="end-screen" class="min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden hidden">
    <div class="max-w-md w-full bg-yellow-400 rounded-3xl p-8 border-4 border-slate-900 border-b-[12px] text-center relative">
      <div class="absolute inset-0 overflow-hidden rounded-2xl pointer-events-none opacity-20">
         <div class="w-[200%] h-[200%] absolute top-[-50%] left-[-50%] radial-burst animate-spin-bg"></div>
      </div>
      <div class="relative z-10">
        <div class="w-32 h-32 bg-white rounded-full mx-auto mb-6 flex items-center justify-center border-4 border-slate-900 border-b-8 shadow-[0_0_30px_rgba(250,204,21,1)]">
          <span class="text-6xl animate-bounce">👑</span>
        </div>
        <h1 class="text-4xl sm:text-5xl font-black text-slate-900 mb-2 tracking-wide drop-shadow-sm">傳說級勇者誕生!</h1>
        <p class="text-xl font-bold text-slate-800 mb-6">全裝備收集完成 (12/12)</p>

        <div id="end-backpack-grid" class="bg-white/80 p-4 rounded-xl border-2 border-slate-900 mb-8 grid grid-cols-4 gap-2"></div>

        <button onclick="replay()" class="w-full bg-indigo-500 hover:bg-indigo-400 text-white font-black text-2xl py-4 px-6 rounded-2xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-2 transition-all flex items-center justify-center gap-2">
          <span>🔄</span> 重新冒險
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- 語音播放工具 ---
    const speak = (text) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-TW';
        utterance.rate = 0.85; 
        utterance.pitch = 1.1; 
        window.speechSynthesis.speak(utterance);
      } else {
        console.warn("此瀏覽器不支援語音合成功能");
      }
    };

    // --- 遊戲資料 ---
    const gameData = [
      {
        title: "第一關：選擇你的角色", icon: "⚔️", iconColor: "text-blue-500", iconBg: "bg-blue-100", rewardName: "勇者木劍", rewardIcon: "⚔️",
        story: "歡迎登入「國中」新地圖！你想當勇敢的「主角」，還是旁邊發呆的「村民」？在電玩裡，主角遇到困難不會逃跑，而是把它當作「賺經驗值」的大好機會喔！",
        question: "國中英文單字變好多，根本背不完！身為主角，你會怎麼辦？",
        options: [
          { text: "覺得自己太笨，乾脆不背了，去打手遊比較開心。", isCorrect: false, feedback: "哎呀，這是村民的逃避招式喔！主角不怕困難，我們再試一次，一定有更好的辦法！" },
          { text: "把單字切成小塊，每天只背5個，慢慢賺經驗值！", isCorrect: true, feedback: "叮咚叮咚！太棒了！主角就是會找方法破關，恭喜你賺到滿滿經驗值！" }
        ]
      },
      {
        title: "第二關：裝備樂觀加速器", icon: "🚀", iconColor: "text-orange-500", iconBg: "bg-orange-100", rewardName: "樂觀火箭", rewardIcon: "🚀",
        story: "闖關需要裝備「樂觀加速器」！樂觀不是假裝沒事，而是相信自己「可以找到過關的方法」。悲觀就像一直踩煞車，會讓你在原地卡住喔。",
        question: "第一次數學考試考砸了，分數好低...這時你要怎麼開啟「樂觀加速器」？",
        options: [
          { text: "跟自己說：「沒關係，我去問老師這題怎麼算，下次一定會進步！」", isCorrect: true, feedback: "轟隆隆！樂觀加速器啟動！不怕失敗，勇敢找人幫忙就是最棒的！" },
          { text: "跟自己說：「我就是笨，以後數學課我都趴著睡覺好了。」", isCorrect: false, feedback: "嗶嗶！踩到悲觀煞車，車子卡住了啦！每個人都可以進步，不要太快放棄喔，再選一次吧！" }
        ]
      },
      {
        title: "第三關：升級你的等級", icon: "✨", iconColor: "text-yellow-500", iconBg: "bg-yellow-100", rewardName: "魅力星光", rewardIcon: "✨",
        story: "解決煩惱最好的方法，就是「練等升級」！當你努力變強，原本覺得很可怕的煩惱怪獸，就會變成弱小的小史萊姆了。",
        question: "好擔心上國中交不到新朋友...你要怎麼用「升級自己」的祕技來打敗這個煩惱怪獸？",
        options: [
          { text: "每天下課都躲在座位上發呆，等別人主動來找我講話。", isCorrect: false, feedback: "躲起來發呆，等級是不會提升的喔！試著讓自己變有趣，朋友就會自動靠過來啦！" },
          { text: "主動參加社團、學新花招，讓自己變成一個超酷又熱心的人！", isCorrect: true, feedback: "太神啦！當你把自己練得超強、超有趣，自然就會吸引好多神隊友！" }
        ]
      },
      {
        title: "第四關：面對組隊誘惑", icon: "🎮", iconColor: "text-purple-500", iconBg: "bg-purple-100", rewardName: "專注手把", rewardIcon: "🎮",
        story: "國中除了讀書，還有好多好玩的社團和手遊！但是「主角」知道，要打敗最後大魔王，必須學會分配時間，不能只挑輕鬆的任務做。",
        question: "明天要月考了，好朋友卻一直狂傳訊息揪你打排位賽。身為主角的你，會怎麼做？",
        options: [
          { text: "怕拒絕會很沒面子，先陪打幾場，考試隨便猜一猜就好。", isCorrect: false, feedback: "糟糕，被朋友帶著走了，這是村民的做法喔！主角要為自己的任務負責，勇敢拒絕看看吧！" },
          { text: "勇敢跟朋友說：「今晚不行，我要先解考試任務！週末再陪你們打爆對手！」", isCorrect: true, feedback: "帥呆了！真正的神玩家懂得分配時間，先破完考試任務，週末玩起來才沒壓力！" }
        ]
      },
      {
        title: "第五關：躲避陷阱不扣血", icon: "🛡️", iconColor: "text-red-500", iconBg: "bg-red-100", rewardName: "鋼鐵護盾", rewardIcon: "🛡️",
        story: "國中的規定變多了。有時候不小心犯錯被老師糾正，感覺就像踩到陷阱被扣了血量，這時千萬不要生悶氣喔！",
        question: "完蛋！忘記帶聯絡簿被老師罵了。裝備「樂觀加速器」的你，腦袋裡會怎麼想？",
        options: [
          { text: "「原來國中抓這麼嚴！我今晚馬上做一張『裝備檢查表』，明天絕對不漏接！」", isCorrect: true, feedback: "答對啦！把老師的提醒當作收集情報，升級裝備，下次就不會踩到陷阱扣血啦！" },
          { text: "「老師一定很討厭我，我好倒楣...」然後心情超差，整天都不想理人。", isCorrect: false, feedback: "唉唷，悲觀煞車踩太大力，心情扣血了啦！老師只是提醒你規則，調整一下裝備清單就好囉，再試一次！" }
        ]
      },
      {
        title: "第六關：打敗巨大作業怪獸", icon: "📖", iconColor: "text-teal-500", iconBg: "bg-teal-100", rewardName: "智慧寶典", rewardIcon: "📖",
        story: "國中多了生物、歷史、地理...課本疊起來像小山！要讀的書好多，作業怪獸也變巨大了！",
        question: "遇到這個巨大的作業怪獸，你要怎麼升級打敗牠？",
        options: [
          { text: "假裝沒看到，只讀自己喜歡的科目，其他全部放棄不念。", isCorrect: false, feedback: "逃跑是沒有用的，怪獸還是會越長越大喔！試著找找看有沒有什麼新武器或好隊友幫忙吧！" },
          { text: "找新武器！去問學長姐或老師「怎麼做超強筆記」，讓自己的戰鬥力大升級！", isCorrect: true, feedback: "完美擊殺！當你學會超強筆記術這把新武器，可怕作業怪獸就會掉滿地寶物，讓你狂升級！" }
        ]
      },
      {
        title: "第七關：登入新地圖", icon: "🗺️", iconColor: "text-green-600", iconBg: "bg-green-100", rewardName: "萬能導航地圖", rewardIcon: "🗺️",
        story: "掌握了主角心態後，我們正式拿到國中新手村的登入憑證！這是一張全新的地圖，有新的學校地址，上學的路線也跟國小不一樣了。",
        question: "開學第一天，為了準時到達新國中，你該怎麼做最聰明？",
        options: [
          { text: "憑感覺隨便走，或者當天早上才開始查地圖，迷路就算了。", isCorrect: false, feedback: "哎呀，這樣很容易遲到扣血喔！新手玩家上路，記得要先看地圖準備！" },
          { text: "提前和家人看地圖，畫出走路或搭車的完美路線，預留時間出發！", isCorrect: true, feedback: "叮咚叮咚！沒錯，專業玩家都會先查好地圖攻略，準時抵達新手村！" }
        ]
      },
      {
        title: "第八關：建立角色資料卡", icon: "📋", iconColor: "text-blue-600", iconBg: "bg-blue-200", rewardName: "安全徽章", rewardIcon: "📋",
        story: "進入國中前，系統要你填寫「角色資料卡」！裡面包含身分證字號、緊急聯絡人，還有過敏和用藥紀錄，這是為了保護你的安全喔。",
        question: "遇到不會填的格子（例如：家長手機號碼或過敏藥物），你會怎麼做？",
        options: [
          { text: "拿回家請家人幫忙，把正確的資料填上去，保護自己的安全！", isCorrect: true, feedback: "帥呆了！填寫正確的資料，就像幫自己穿上防護罩，老師才能在危險時幫你補血！" },
          { text: "覺得格子太多很煩，隨便亂寫數字，或者直接空白交出去。", isCorrect: false, feedback: "嗶嗶！這樣遇到危險時，系統會找不到人來救你喔！資料卡很重要，請家人幫忙填寫吧！" }
        ]
      },
      {
        title: "第九關：破解任務課表", icon: "📅", iconColor: "text-purple-600", iconBg: "bg-purple-200", rewardName: "記憶時鐘", rewardIcon: "📅",
        story: "國中的任務表（課表）變好長，每天竟然有 8 節課！還多了「表演藝術」跟「社團活動」這些國小沒有的新挑戰！",
        question: "面對密密麻麻的新課表，最聰明的整理裝備（書包）方法是什麼？",
        options: [
          { text: "不管它，把所有課本全部塞進書包，重到走不動為止。", isCorrect: false, feedback: "糟糕，超重會讓你的移動速度變慢、體力扣光光喔！試著看任務表來整理裝備吧！" },
          { text: "前一天晚上對照任務表，只把明天上課需要的課本放進書包。", isCorrect: true, feedback: "聰明！這才是專業玩家的背包管理法，精準帶裝備，輕鬆上學去！" }
        ]
      },
      {
        title: "第十關：職業島-孔雀島", icon: "🎨", iconColor: "text-pink-500", iconBg: "bg-pink-100", rewardName: "藝術畫筆", rewardIcon: "🎨",
        story: "國中可以開始探索未來的職業！地圖上有好幾座「職業島」。有一座島充滿了畫筆、樂器和故事書，是想像力的天堂！",
        question: "如果你超喜歡「畫漫畫、聽音樂、寫小說」，你最適合登陸哪一座島嶼？",
        options: [
          { text: "充滿規定，每天都要檢查數字和算錢的「大象島」。", isCorrect: false, feedback: "好像走錯島嶼了？大象島比較適合喜歡整理資料和算錢的玩家喔，再選一次看看！" },
          { text: "充滿創意與美感的「孔雀島」（藝術型）！", isCorrect: true, feedback: "登島成功！你的藝術細胞在孔雀島會得到超級強化，這裡有滿滿的創作能量！" }
        ]
      },
      {
        title: "第十一關：職業島-牛牛島", icon: "🔧", iconColor: "text-orange-600", iconBg: "bg-orange-200", rewardName: "萬能扳手", rewardIcon: "🔧",
        story: "除了藝術，有的玩家天生就喜歡「動手操作」！不管是組裝模型、修理東西，還是進廚房做料理，都能讓他們充滿活力。",
        question: "如果你最喜歡「澆花種菜、做點心飲料、親手做勞作」，你是屬於哪種島的居民？",
        options: [
          { text: "喜歡動手做、操作工具的「牛牛島」（實用型）！", isCorrect: true, feedback: "答對了！實用型玩家最擅長把東西親手做出來，動手能力戰鬥力超高！" },
          { text: "喜歡上台演講、說服別人加入社團的「獅子島」。", isCorrect: false, feedback: "獅子島比較適合喜歡當隊長、帶領大家冒險的人喔。喜歡動手做的話，應該是另一座島！" }
        ]
      },
      {
        title: "第十二關：職業島-海豚島", icon: "🤝", iconColor: "text-red-500", iconBg: "bg-red-200", rewardName: "溫暖愛心", rewardIcon: "🤝",
        story: "在職業島上，還有一群喜歡幫助別人、充滿愛心的玩家！他們最喜歡跟同學一起活動，是團隊裡的超強補師！",
        question: "當同學遇到困難，你總是第一個跳出來幫忙，也喜歡當小義工，你是哪座島的居民？",
        options: [
          { text: "喜歡自己一個人安靜思考科學問題的「貓頭鷹島」。", isCorrect: false, feedback: "貓頭鷹喜歡一個人靜靜做研究，如果你喜歡熱鬧和幫助別人，應該是另一座島喔！" },
          { text: "充滿溫暖、喜歡照顧別人和交朋友的「海豚島」（社會型）！", isCorrect: true, feedback: "完美結島！海豚島的玩家就是團隊裡最不可或缺的好夥伴，恭喜你完成所有探索！" }
        ]
      }
    ];

    // --- 遊戲狀態管理 ---
    let gameState = 'start';
    let currentLevel = 0;
    let xp = 0;
    let feedback = null;
    let collectedItems = [];

    // --- 遊戲邏輯 ---
    function startGame() {
      gameState = 'playing';
      currentLevel = 0;
      xp = 0;
      collectedItems = [];
      feedback = null;
      speak("遊戲開始！歡迎來到國中轉銜大挑戰。");
      render();
    }

    function handleOptionClick(optIdx) {
      if (feedback !== null) return;
      const option = gameData[currentLevel].options[optIdx];
      feedback = {
        isCorrect: option.isCorrect,
        text: option.feedback
      };
      if (option.isCorrect) {
        speak(`${option.feedback} 獲得裝備：${gameData[currentLevel].rewardName}！`);
      } else {
        speak(option.feedback);
      }
      render();
    }

    function nextLevel() {
      xp += 100;
      collectedItems.push(currentLevel);
      feedback = null;
      if (currentLevel < gameData.length - 1) {
        currentLevel++;
      } else {
        gameState = 'end';
        speak("太神啦！你已經完成了12個國中轉銜任務，打倒了大魔王，準備好迎接國中生活了嗎？");
      }
      render();
    }

    function replay() {
      gameState = 'start';
      render();
    }

    function setFeedbackNull() {
      feedback = null;
      render();
    }

    // --- 渲染畫面 ---
    function render() {
      document.getElementById('start-screen').classList.toggle('hidden', gameState !== 'start');
      document.getElementById('playing-screen').classList.toggle('hidden', gameState !== 'playing');
      document.getElementById('end-screen').classList.toggle('hidden', gameState !== 'end');

      if (gameState === 'playing') {
        const level = gameData[currentLevel];

        // 1. 更新稱號
        let rankIcon = '🗺️', rankTitle = '新手村民', rankColor = 'text-slate-400', rankBg = 'bg-slate-700';
        if (xp >= 300 && xp < 700) { rankIcon = '⭐'; rankTitle = '銅牌冒險者'; rankColor = 'text-orange-400'; rankBg = 'bg-orange-900'; }
        else if (xp >= 700 && xp < 1100) { rankIcon = '🎖️'; rankTitle = '銀牌主角'; rankColor = 'text-slate-200'; rankBg = 'bg-slate-500'; }
        else if (xp >= 1100) { rankIcon = '👑'; rankTitle = '傳說級勇者'; rankColor = 'text-yellow-400'; rankBg = 'bg-yellow-600'; }

        const rankBadge = document.getElementById('rank-badge');
        rankBadge.className = `absolute -top-4 -left-2 ${rankBg} border-2 border-slate-900 px-3 py-1 rounded-full flex items-center gap-1 shadow-lg transform -rotate-3 z-10 animate-pulse`;
        document.getElementById('rank-icon').textContent = rankIcon;
        document.getElementById('rank-title').textContent = rankTitle;
        document.getElementById('rank-title').className = `font-black text-sm ${rankColor}`;

        // 2. 更新 XP 條
        document.getElementById('xp-bar').style.width = `${(xp / 1200) * 100}%`;
        document.getElementById('xp-text').textContent = `${xp} XP`;

        // 3. 更新戰鬥競技場
        const actionState = !feedback ? 'idle' : (feedback.isCorrect ? 'hero-attack' : 'monster-attack');
        const heroAvatar = document.getElementById('hero-avatar');
        const monsterAvatar = document.getElementById('monster-avatar');
        const heroSword = document.getElementById('hero-sword');
        const monsterDamage = document.getElementById('monster-damage-text');

        heroAvatar.className = `relative z-10 transition-all duration-300 transform ${actionState === 'hero-attack' ? 'translate-x-12 sm:translate-x-32 scale-110 drop-shadow-2xl' : actionState === 'monster-attack' ? '-translate-x-4 rotate-[-10deg]' : 'animate-bob'}`;
        heroSword.className = `transition-transform duration-300 origin-left ${actionState === 'hero-attack' ? 'rotate-45' : actionState === 'monster-attack' ? '-rotate-90 translate-y-4' : ''}`;
        monsterAvatar.className = `relative z-10 transition-all duration-300 transform ${actionState === 'monster-attack' ? '-translate-x-12 sm:-translate-x-32 scale-110 drop-shadow-2xl' : actionState === 'hero-attack' ? 'translate-x-4 rotate-[15deg] brightness-150' : 'animate-bob-delay'}`;
        
        monsterDamage.classList.toggle('hidden', actionState !== 'hero-attack');

        const visualHp = Math.max(0, 1200 - (feedback?.isCorrect ? xp + 100 : xp));
        document.getElementById('monster-hp-bar').style.width = `${(visualHp / 1200) * 100}%`;

        // 4. 更新任務卡片內容
        document.getElementById('level-title').textContent = level.title;
        document.getElementById('level-counter').textContent = `任務 ${currentLevel + 1}/12`;
        
        const mainIcon = document.getElementById('level-main-icon');
        mainIcon.className = `w-32 h-32 mx-auto mb-6 rounded-3xl border-4 border-slate-900 border-b-8 flex items-center justify-center transform hover:-rotate-3 hover:scale-110 duration-300 animate-[bounce_3s_infinite] text-6xl ${level.iconBg}`;
        mainIcon.innerHTML = `<span class="${level.iconColor} drop-shadow-sm">${level.icon}</span>`;

        document.getElementById('level-story').textContent = level.story;
        document.getElementById('level-question').textContent = level.question;

        document.getElementById('btn-story-voice').onclick = (e) => { e.stopPropagation(); speak(level.story); };
        document.getElementById('btn-question-voice').onclick = (e) => { e.stopPropagation(); speak(level.question); };

        // 5. 更新選項按鈕
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        level.options.forEach((opt, idx) => {
          const label = ['A', 'B'][idx];
          const isDisabled = feedback !== null;
          optionsContainer.innerHTML += `
            <div class="flex gap-3">
              <button onclick="event.stopPropagation(); speak('${opt.text}')" class="shrink-0 p-3 sm:p-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 transition-all flex items-center justify-center bg-slate-300 hover:bg-slate-200">
                <span class="text-2xl drop-shadow-sm">🔊</span>
              </button>
              <button onclick="handleOptionClick(${idx})" ${isDisabled ? 'disabled' : ''} class="flex-1 bg-white hover:bg-slate-100 border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 text-slate-900 font-bold text-lg sm:text-xl py-4 px-4 sm:px-6 rounded-2xl transition-all text-left flex items-center ${isDisabled ? 'opacity-50 cursor-not-allowed' : ''}">
                <span class="bg-slate-900 text-white rounded-full w-8 h-8 flex items-center justify-center font-black mr-3 shrink-0">${label}</span>
                ${opt.text}
              </button>
            </div>
          `;
        });

        // 6. 更新背包系統
        document.getElementById('backpack-count').textContent = `${collectedItems.length} / 12 裝備`;
        const backpackGrid = document.getElementById('backpack-grid');
        backpackGrid.innerHTML = '';
        gameData.forEach((item, idx) => {
          const isCollected = collectedItems.includes(idx);
          const bgClass = isCollected ? 'bg-slate-700 border-slate-500 shadow-inner' : 'bg-slate-900 border-slate-800';
          backpackGrid.innerHTML += `
            <div class="aspect-square rounded-xl border-2 flex items-center justify-center transition-all ${bgClass}" title="${isCollected ? item.rewardName : '未解鎖'}">
              ${isCollected 
                ? `<span class="text-3xl animate-[pulse_2s_infinite]">${item.rewardIcon}</span>` 
                : `<span class="text-xl opacity-50">🔒</span>`
              }
            </div>
          `;
        });

        // 7. 更新 Modal (回饋視窗)
        const modal = document.getElementById('feedback-modal');
        const modalFx = document.getElementById('feedback-bg-fx');
        const modalCard = document.getElementById('feedback-card');

        if (feedback) {
          modal.classList.remove('hidden');
          modalFx.classList.toggle('hidden', !feedback.isCorrect);
          
          modalCard.className = `w-full max-w-sm border-4 border-slate-900 border-b-[12px] rounded-3xl p-6 text-center transform animate-zoom-in relative z-10 ${feedback.isCorrect ? 'bg-green-400' : 'bg-red-400'}`;
          
          modalCard.innerHTML = feedback.isCorrect ? `
            <div class="absolute -top-16 left-1/2 -translate-x-1/2 text-4xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] animate-[bounce_1s_infinite]">
              +100 XP
            </div>
            <div class="flex justify-center mb-2 mt-4 relative">
              <div class="absolute inset-0 bg-yellow-300 rounded-full blur-xl opacity-50 animate-pulse"></div>
              <div class="w-28 h-28 bg-white rounded-full border-4 border-slate-900 border-b-8 flex flex-col items-center justify-center relative z-10 transform hover:scale-110 transition-transform">
                 <span class="text-[10px] font-black text-slate-400 mb-1">獲得裝備</span>
                 <span class="text-5xl animate-[bounce_2s_infinite] drop-shadow-md">${level.rewardIcon}</span>
              </div>
            </div>
            <h3 class="text-3xl font-black mb-4 text-slate-900 drop-shadow-sm">解鎖：${level.rewardName}！</h3>
            <div class="bg-white/90 border-4 border-slate-900 rounded-2xl p-4 mb-6">
              <p class="text-xl font-bold text-slate-800 leading-relaxed text-left">${feedback.text}</p>
            </div>
            <div class="flex flex-col gap-3">
              <button onclick="speak('${feedback.text}')" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-black py-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 flex justify-center items-center gap-2 transition-all">
                <span class="text-2xl">🔊</span> 聽語音解說
              </button>
              <button onclick="nextLevel()" class="w-full bg-blue-500 hover:bg-blue-400 text-white font-black text-2xl py-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 flex justify-center items-center gap-2 transition-all">
                前往下一關 <span>➡️</span>
              </button>
            </div>
          ` : `
            <div class="flex justify-center mb-4 mt-2">
              <div class="w-24 h-24 bg-white rounded-full border-4 border-slate-900 border-b-8 flex items-center justify-center">
                <span class="text-5xl animate-shake">🛡️</span>
              </div>
            </div>
            <h3 class="text-3xl font-black mb-4 text-slate-900 drop-shadow-sm">想一想喔！</h3>
            <div class="bg-white/90 border-4 border-slate-900 rounded-2xl p-4 mb-6">
              <p class="text-xl font-bold text-slate-800 leading-relaxed text-left">${feedback.text}</p>
            </div>
            <div class="flex flex-col gap-3">
              <button onclick="speak('${feedback.text}')" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-black py-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 flex justify-center items-center gap-2 transition-all">
                <span class="text-2xl">🔊</span> 聽語音解說
              </button>
              <button onclick="setFeedbackNull()" class="w-full bg-amber-400 hover:bg-amber-300 text-slate-900 font-black text-2xl py-4 rounded-xl border-4 border-slate-900 border-b-8 active:border-b-4 active:translate-y-1 flex justify-center items-center gap-2 transition-all">
                <span>🔄</span> 再試一次
              </button>
            </div>
          `;
        } else {
          modal.classList.add('hidden');
        }
      }

      if (gameState === 'end') {
        const endBackpack = document.getElementById('end-backpack-grid');
        endBackpack.innerHTML = '';
        gameData.forEach(item => {
          endBackpack.innerHTML += `
            <div class="aspect-square bg-slate-900 rounded-lg flex items-center justify-center border-2 border-slate-700">
              <span class="text-3xl">${item.rewardIcon}</span>
            </div>
          `;
        });
      }
    }

    // 初始載入渲染
    window.onload = render;
  </script>
</body>
</html>
